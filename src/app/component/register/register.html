<div class="auth-header-container">

  <div class="auth-header">
    <img src="assets/logo.png" alt="GEOQUEST" />
    <h1 class="auth-title">GEOQUEST</h1>
  </div>
</div>

<form (ngSubmit)="onSubmit()" #registerForm="ngForm">
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="form-title">REGISTRARSE</h2>

      <div class="form-group">
        <label>Usuario:</label>
        <input type="text" class="form-input"
               id="usuario"
               name="username"
               [(ngModel)]="registerData.username"
               placeholder="Ingresa usuario"
               required
               minlength="3"
               #username="ngModel" />
        <div *ngIf="username.invalid && username.touched" class="error">
          <div *ngIf="username.errors?.['required']"><b>Nombre de usuario</b> es requerido</div>
          <div *ngIf="username.errors?.['minlength']"><b>Mínimo 3 caracteres</b></div>
        </div>

      </div>

      <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" class="form-input"
               id="password"
               name="password"
               [(ngModel)]="registerData.password"
               placeholder="Contraseña"
               required
               minlength="6"
               #password="ngModel" />
        <div *ngIf="password.invalid && password.touched" class="error">
          <div *ngIf="password.errors?.['required']"><b>Contraseña</b> es requerida</div>
          <div *ngIf="password.errors?.['minlength']"><b>Mínimo 6 caracteres</b></div>
        </div>

      </div>

      <button class="btn-enter"  type="submit"
              [disabled]="registerForm.invalid">ENTRAR</button>

      <p class="auth-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-Message">
        {{ successMessage }}
      </div>
    </div>
  </div>
</form>
